name = "stele-signaling"
main = "src/index.ts"
compatibility_date = "2026-04-25"

# Durable Object: one RoomDO instance per pairing_id. Strongly consistent
# storage with serialised request handling — eliminates KV's eventual-
# consistency lag that broke cross-region paired chats.
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDO"

# Initial migration creating the RoomDO class. Uses the SQLite-backed
# storage variant which is available on the free Workers plan
# (`new_classes` requires Workers Paid). Add `renamed_classes` /
# `deleted_classes` here if the DO class ever changes name or is removed.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Production deployment: point stele.au/signal* at this worker via a route
# when the signaling endpoint goes public.
#
# [[routes]]
# pattern = "stele.au/signal*"
# custom_domain = false
